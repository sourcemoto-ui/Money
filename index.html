<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>綜合財富管理系統 Pro</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 載入 React, ReactDOM 與 Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 隱藏數字輸入框的上下箭頭 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
    
    /* 隱私遮蔽模式的模糊效果 */
    .privacy-blur {
      filter: blur(6px);
      opacity: 0.7;
      transition: filter 0.3s ease, opacity 0.3s ease;
      user-select: none;
    }
    .privacy-blur:focus, .privacy-blur:active {
      filter: blur(0px);
      opacity: 1;
    }

    /* 隱藏捲軸但保留滾動功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- 圖示對映元件 ---
    const Icon = ({ name, size = 20, className = '' }) => {
      const faMap = {
        'Wallet': 'fa-solid fa-wallet',
        'TrendingUp': 'fa-solid fa-arrow-trend-up',
        'TrendingDown': 'fa-solid fa-arrow-trend-down',
        'Banknote': 'fa-solid fa-money-bill-wave',
        'PieChart': 'fa-solid fa-chart-pie',
        'ArrowRightLeft': 'fa-solid fa-right-left',
        'Bike': 'fa-solid fa-motorcycle',
        'ClipboardCheck': 'fa-solid fa-clipboard-check',
        'Plus': 'fa-solid fa-plus',
        'Trash2': 'fa-solid fa-trash-can',
        'Edit2': 'fa-solid fa-pen-to-square',
        'Cloud': 'fa-solid fa-cloud',
        'Upload': 'fa-solid fa-upload',
        'Download': 'fa-solid fa-download',
        'RefreshCw': 'fa-solid fa-rotate',
        'CheckCircle2': 'fa-solid fa-circle-check',
        'AlertCircle': 'fa-solid fa-circle-exclamation',
        'Database': 'fa-solid fa-database',
        'Moon': 'fa-solid fa-moon',
        'Sun': 'fa-solid fa-sun',
        'ChevronDown': 'fa-solid fa-chevron-down',
        'ChevronUp': 'fa-solid fa-chevron-up',
        'CreditCard': 'fa-solid fa-credit-card',
        'Activity': 'fa-solid fa-chart-line',
        'Eye': 'fa-solid fa-eye',
        'EyeOff': 'fa-solid fa-eye-slash',
        'Target': 'fa-solid fa-bullseye',
        'FileExport': 'fa-solid fa-file-export',
        'FileImport': 'fa-solid fa-file-import',
        'Calendar': 'fa-regular fa-calendar',
        'FileX': 'fa-solid fa-file-circle-xmark',
        'List': 'fa-solid fa-list-ul',
        'Calculator': 'fa-solid fa-calculator',
        'FileSpreadsheet': 'fa-solid fa-file-excel',
        'Droplets': 'fa-solid fa-droplet',
        'Zap': 'fa-solid fa-bolt',
        'Users': 'fa-solid fa-users',
        'Copy': 'fa-regular fa-copy',
        'CheckCircle': 'fa-regular fa-circle-check',
        'Bell': 'fa-solid fa-bell',
        'Clock': 'fa-regular fa-clock',
        'Code': 'fa-solid fa-code',
        'Terminal': 'fa-solid fa-terminal',
        'BookOpen': 'fa-solid fa-book-open',
        // --- 新增 ETF 模組專用圖示 ---
        'DollarSign': 'fa-solid fa-dollar-sign',
        'Info': 'fa-solid fa-circle-info',
        'PiggyBank': 'fa-solid fa-piggy-bank',
        'ShieldAlert': 'fa-solid fa-shield-halved'
      };
      return <i className={`${faMap[name]} ${className}`} style={{ fontSize: size }}></i>;
    };

    const App = () => {
      // ==========================================
      // 1. 狀態管理 (State)
      // ==========================================
      const [activeTab, setActiveTab] = useState('wealth'); // 'wealth', 'cnc', 'utilities', 'etf'

      // --- 財富管理狀態 ---
      const [assets, setAssets] = useState({
        banks: [
          { id: 'cash_hand', name: '手頭現金', amount: 50000 },
          { id: 'future', name: '將來銀行', amount: 25968 },
          { id: 'cathay_1', name: '國泰世華 (帳戶1)', amount: 382514 },
          { id: 'esun', name: '玉山銀行', amount: 726249 },
        ],
        stocks: [
          { id: 'cathay_s1', name: '國泰金 (2882)', amount: 441717 },
          { id: 'esun_s', name: '玉山金 (2884)', amount: 28891 },
          { id: 'pending_settlement', name: '待交割款 (負數為扣款)', amount: 0 },
        ],
        foreign: [
          { id: 'cathay_usd', name: '國泰美股部位', amount: 1054, currency: 'USD' }
        ],
        vehicles: [
          { id: 'cb650r', name: 'Honda CB650R', amount: 250000 },
          { id: 'cb350cafe', name: 'Honda CB350 Cafe Racer', amount: 220000 },
          { id: 'vespa150', name: 'Vespa 150', amount: 55000 },
        ]
      });
      const [liabilities, setLiabilities] = useState([{ id: 'cc_1', name: '信用卡未出帳單', amount: 0 }]);
      const [fixedExpenses, setFixedExpenses] = useState([
        { id: 'pension', name: '應繳勞退金', amount: 1770, note: '每月' },
        { id: 'labor', name: '勞保保險費', amount: 3371, note: '每月' },
        { id: 'health', name: '健保費', amount: 1542, note: '每月' }
      ]);
      const [usdRate, setUsdRate] = useState(32.5);
      const [financialGoal, setFinancialGoal] = useState(5000000);
      const [paidRecords, setPaidRecords] = useState({});
      const [historyData, setHistoryData] = useState([]);

      // --- CNC 繳款紀錄狀態 ---
      const initialCncData = [
        { id: 1, date: '2025-10-01', type: 'debt', desc: '2025/10/10 前期初餘額', amount: 17400, category: '貨款' },
        { id: 2, date: '2025-10-20', type: 'payment', desc: '第一次付款', amount: 5000, category: '付款' },
      ];
      const [cncRecords, setCncRecords] = useState(initialCncData);
      const [isCncModalOpen, setIsCncModalOpen] = useState(false);
      const [editingCncId, setEditingCncId] = useState(null);
      const [cncFilterType, setCncFilterType] = useState('all');
      const [cncFormData, setCncFormData] = useState({
        date: new Date().toISOString().split('T')[0], type: 'payment', desc: '', amount: '', category: '付款'
      });

      // --- 水電費分攤狀態 (Utility Manager) ---
      const [utilityTab, setUtilityTab] = useState('calculator'); 
      const [xinleBills, setXinleBills] = useState({ floor1Elec: '', floor2Elec: '', floor3Elec: '', water: '' });
      const [wuqingBills, setWuqingBills] = useState({ totalElec: '', totalWater: '' });
      const [wuqingPeople, setWuqingPeople] = useState({ famA: 1, famB: 3 });
      const [copiedCSV, setCopiedCSV] = useState(false);
      const [copiedGAS, setCopiedGAS] = useState(false);

      // --- 高股息 ETF 存股試算狀態 ---
      const [targetMonthly, setTargetMonthly] = useState(15000);
      const [etfs, setEtfs] = useState([
        { id: 1, code: '00878', name: '國泰永續高股息', shares: 10000, price: 22.5, divPerPeriod: 0.51, frequency: 4 },
        { id: 2, code: '00919', name: '群益台灣精選高息', shares: 5000, price: 26.0, divPerPeriod: 0.66, frequency: 4 },
        { id: 3, code: '00918', name: '大華優利高填息30', shares: 2000, price: 24.0, divPerPeriod: 0.70, frequency: 4 },
        { id: 4, code: '00929', name: '復華台灣科技優息(推薦)', shares: 0, price: 20.5, divPerPeriod: 0.13, frequency: 12 },
        { id: 5, code: '00713', name: '元大台灣高息低波(推薦)', shares: 0, price: 55.0, divPerPeriod: 1.50, frequency: 4 },
        { id: 6, code: '0056', name: '元大高股息(推薦)', shares: 0, price: 39.0, divPerPeriod: 0.79, frequency: 4 },
      ]);

      // --- UI 控制狀態 ---
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [isPrivacyMode, setIsPrivacyMode] = useState(false);
      const [sectionsCollapsed, setSectionsCollapsed] = useState({
        banks: false, vehicles: true, stocks: false, liabilities: false, expenses: false
      });
      
      // --- 雲端與自動儲存狀態 ---
      const defaultSyncUrl = 'https://script.google.com/macros/s/AKfycbyGuK452HXSJjDg2YicN1_fh2HJG-9K6LaII1yalSl9pcPRMf5Zgr6r_B7nzOJwihO7ow/exec';
      const [syncUrl, setSyncUrl] = useState(defaultSyncUrl);
      const [syncState, setSyncState] = useState({ status: 'idle', message: '' }); 
      const [isInitialLoading, setIsInitialLoading] = useState(true);
      const fileInputRef = useRef(null);
      const isFirstRender = useRef(true);

      // ==========================================
      // 2. 初始化與雲端同步邏輯
      // ==========================================
      useEffect(() => {
        const savedUrl = localStorage.getItem('wealthTrackerSyncUrl') || defaultSyncUrl;
        const savedMode = localStorage.getItem('wealthTrackerDarkMode') === 'true';
        const savedPrivacy = localStorage.getItem('wealthTrackerPrivacyMode') === 'true';
        setSyncUrl(savedUrl);
        setIsDarkMode(savedMode);
        setIsPrivacyMode(savedPrivacy);
        
        if (savedUrl) loadFromCloud(savedUrl, true);
        else setIsInitialLoading(false);
      }, []);

      // 防抖自動儲存 (包含 ETF 狀態)
      useEffect(() => {
        if (isFirstRender.current || isInitialLoading) {
          isFirstRender.current = false; return;
        }
        const autoSaveTimer = setTimeout(() => saveToCloud(true), 2500);
        return () => clearTimeout(autoSaveTimer);
      }, [assets, liabilities, fixedExpenses, usdRate, paidRecords, financialGoal, cncRecords, xinleBills, wuqingBills, wuqingPeople, etfs, targetMonthly]);

      const toggleDarkMode = () => { setIsDarkMode(!isDarkMode); localStorage.setItem('wealthTrackerDarkMode', !isDarkMode); };
      const togglePrivacyMode = () => { setIsPrivacyMode(!isPrivacyMode); localStorage.setItem('wealthTrackerPrivacyMode', !isPrivacyMode); };

      const loadFromCloud = async (url = syncUrl, isInitial = false) => {
        if (!url) { if (isInitial) setIsInitialLoading(false); return; }
        if (!isInitial) setSyncState({ status: 'loading', message: '正在同步最新資料...' });
        
        try {
          const fetchUrl = url.includes('?') ? `${url}&t=${Date.now()}` : `${url}?t=${Date.now()}`;
          const res = await fetch(fetchUrl, { redirect: 'follow', cache: 'no-store' });
          const text = await res.text(); 
          let data;
          try { data = JSON.parse(text); } catch (e) { throw new Error('資料格式異常'); }
          
          if (data && Object.keys(data).length > 0) {
            if (data.assets) setAssets(data.assets);
            if (data.liabilities) setLiabilities(data.liabilities);
            if (data.usdRate) setUsdRate(data.usdRate);
            if (data.financialGoal) setFinancialGoal(data.financialGoal);
            if (data.fixedExpenses) setFixedExpenses(data.fixedExpenses);
            if (data.paidRecords) setPaidRecords(data.paidRecords);
            if (data.history) setHistoryData(data.history); 
            if (data.cncRecords) setCncRecords(data.cncRecords);
            if (data.xinleBills) setXinleBills(data.xinleBills);
            if (data.wuqingBills) setWuqingBills(data.wuqingBills);
            if (data.wuqingPeople) setWuqingPeople(data.wuqingPeople);
            if (data.etfs) setEtfs(data.etfs);
            if (data.targetMonthly) setTargetMonthly(data.targetMonthly);
            if (!isInitial) setSyncState({ status: 'success', message: '最新進度同步完成！' });
          }
        } catch (error) {
          console.error(error);
          if (!isInitial) setSyncState({ status: 'error', message: '連線失敗，請檢查網路狀態。' });
        } finally {
          if (isInitial) setTimeout(() => setIsInitialLoading(false), 500);
          setTimeout(() => setSyncState(prev => prev.status === 'loading' ? prev : { status: 'idle', message: '' }), 3000);
        }
      };

      const saveToCloud = async (isAutoSave = false) => {
        if (!syncUrl) return;
        localStorage.setItem('wealthTrackerSyncUrl', syncUrl);
        if (!isAutoSave) setSyncState({ status: 'loading', message: '手動強制儲存中...' });
        else setSyncState({ status: 'loading', message: '自動儲存中...' });

        const currentNetWorth = totals.grandTotal;
        const payload = {
          assets, liabilities, usdRate, financialGoal, fixedExpenses, paidRecords, currentNetWorth, 
          cncRecords, xinleBills, wuqingBills, wuqingPeople, etfs, targetMonthly,
          lastUpdated: new Date().toISOString()
        };

        try {
          await fetch(syncUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' }});
          setSyncState({ status: 'success', message: isAutoSave ? '已自動儲存至雲端' : '強制儲存成功！' });
        } catch (error) {
          setSyncState({ status: 'error', message: '儲存失敗，請檢查連線。' });
        }
        setTimeout(() => setSyncState(prev => prev.status === 'error' ? prev : { status: 'idle', message: '' }), 2500);
      };

      // --- 本地備份匯出與匯入 ---
      const handleExportData = () => {
        const currentNetWorth = totals.grandTotal;
        const dataStr = JSON.stringify({ 
          assets, liabilities, fixedExpenses, paidRecords, usdRate, financialGoal, 
          cncRecords, xinleBills, wuqingBills, wuqingPeople, etfs, targetMonthly, currentNetWorth, 
          lastUpdated: new Date().toISOString() 
        }, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `財富系統備份_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.assets) setAssets(data.assets);
            if (data.liabilities) setLiabilities(data.liabilities);
            if (data.usdRate) setUsdRate(data.usdRate);
            if (data.financialGoal) setFinancialGoal(data.financialGoal);
            if (data.fixedExpenses) setFixedExpenses(data.fixedExpenses);
            if (data.paidRecords) setPaidRecords(data.paidRecords);
            if (data.cncRecords) setCncRecords(data.cncRecords);
            if (data.xinleBills) setXinleBills(data.xinleBills);
            if (data.wuqingBills) setWuqingBills(data.wuqingBills);
            if (data.wuqingPeople) setWuqingPeople(data.wuqingPeople);
            if (data.etfs) setEtfs(data.etfs);
            if (data.targetMonthly) setTargetMonthly(data.targetMonthly);
            
            setSyncState({ status: 'success', message: '資料匯入成功！系統將自動備份至雲端。' });
            setTimeout(() => setSyncState(prev => prev.status === 'success' ? { status: 'idle', message: '' } : prev), 3000);
          } catch (err) {
            console.error(err);
            setSyncState({ status: 'error', message: '匯入失敗：檔案格式錯誤或損毀。' });
            setTimeout(() => setSyncState(prev => prev.status === 'error' ? { status: 'idle', message: '' } : prev), 3000);
          }
        };
        reader.readAsText(file);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      // ==========================================
      // 3. 通用數學與格式化工具
      // ==========================================
      const getNum = (val) => {
        if (val === '' || val === null || val === undefined) return 0;
        if (typeof val === 'number') return val;
        const strVal = String(val).trim();
        try {
          const sanitized = strVal.replace(/[^-()\d/*+.]/g, '');
          if (!sanitized) return 0;
          const safeEvalStr = sanitized.replace(/[+\-*/.]+$/, '');
          if (!safeEvalStr) return 0;
          const result = new Function(`return ${safeEvalStr}`)();
          return isNaN(result) || !isFinite(result) ? 0 : result;
        } catch (e) { return parseFloat(strVal) || 0; }
      };

      const formatCurrency = (num) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(num);
      const displayValue = (val) => isPrivacyMode ? '$***,***' : formatCurrency(val);
      const displayRMB = (val) => isPrivacyMode ? '¥***' : `¥ ${val.toLocaleString()}`;
      const displayShare = (val) => isPrivacyMode ? '***' : val.toLocaleString();

      // ==========================================
      // 4. 財富總覽計算與處理邏輯
      // ==========================================
      const totals = useMemo(() => {
        const bankTotal = assets.banks.reduce((sum, item) => sum + getNum(item.amount), 0);
        const stockTwdTotal = assets.stocks.reduce((sum, item) => sum + getNum(item.amount), 0);
        const foreignTwdTotal = assets.foreign.reduce((sum, item) => sum + (item.currency === 'USD' ? getNum(item.amount) * getNum(usdRate) : getNum(item.amount)), 0);
        const vehicleTotal = assets.vehicles.reduce((sum, item) => sum + getNum(item.amount), 0);
        const liabilityTotal = liabilities.reduce((sum, item) => sum + getNum(item.amount), 0);

        const investmentTotal = stockTwdTotal + foreignTwdTotal;
        const totalAssets = bankTotal + investmentTotal + vehicleTotal;
        const grandTotal = totalAssets - liabilityTotal; 

        const assetSum = totalAssets > 0 ? totalAssets : 1; 
        const alloc = { bank: (bankTotal / assetSum) * 100, stock: (investmentTotal / assetSum) * 100, vehicle: (vehicleTotal / assetSum) * 100 };

        return { bankTotal, stockTotal: investmentTotal, vehicleTotal, liabilityTotal, totalAssets, grandTotal, alloc };
      }, [assets, liabilities, usdRate]);

      const handleDataChange = (category, id, field, value) => {
        if (category === 'liabilities') setLiabilities(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
        else setAssets(prev => ({ ...prev, [category]: prev[category].map(item => item.id === id ? { ...item, [field]: value } : item) }));
      };

      const handleBlurEval = (category, id, field, value) => {
        if (value === '' || value === null || value === undefined) return;
        const strVal = String(value);
        if (!/[+\-*/()]/.test(strVal)) return; 
        handleDataChange(category, id, field, getNum(strVal));
      };

      const handleAddAsset = (category, defaultName = '新項目') => {
        const newId = `${category}_${Date.now()}`;
        if (category === 'liabilities') setLiabilities(prev => [...prev, { id: newId, name: defaultName, amount: 0 }]);
        else setAssets(prev => ({ ...prev, [category]: [...prev[category], { id: newId, name: defaultName, amount: 0 }] }));
      };

      const handleRemoveAsset = (category, id) => {
        if (category === 'liabilities') setLiabilities(prev => prev.filter(item => item.id !== id));
        else setAssets(prev => ({ ...prev, [category]: prev[category].filter(item => item.id !== id) }));
      };

      const currentCashHand = assets.banks.find(b => b.id === 'cash_hand')?.amount ?? '';

      // --- 固定支出核銷邏輯 ---
      const recentMonths = useMemo(() => {
        const result = [];
        const d = new Date();
        for (let i = 5; i >= 0; i--) {
          const monthDate = new Date(d.getFullYear(), d.getMonth() - i, 1);
          result.push({ id: `${monthDate.getFullYear()}-${monthDate.getMonth() + 1}`, label: `${monthDate.getMonth() + 1}月` });
        }
        return result;
      }, []);

      const togglePaid = (expenseId, monthId) => {
        const key = `${expenseId}_${monthId}`;
        const isPaid = paidRecords[key];
        const expense = fixedExpenses.find(e => e.id === expenseId);
        
        if (!isPaid && expense && getNum(expense.amount) > 0) {
          const deductAmount = getNum(expense.amount);
          if (window.confirm(`是否自動從「手頭現金」扣除此筆費用 ${formatCurrency(deductAmount)}？`)) {
            const currentCash = getNum(assets.banks.find(b => b.id === 'cash_hand')?.amount);
            handleDataChange('banks', 'cash_hand', 'amount', currentCash - deductAmount);
          }
        }
        setPaidRecords(prev => ({ ...prev, [key]: !prev[key] }));
      };

      // ==========================================
      // 5. CNC 繳款紀錄邏輯
      // ==========================================
      const cncStats = useMemo(() => {
        const totalDebt = cncRecords.filter(r => r.type === 'debt').reduce((sum, r) => sum + Number(r.amount), 0);
        const totalPaid = cncRecords.filter(r => r.type === 'payment').reduce((sum, r) => sum + Number(r.amount), 0);
        return { totalDebt, totalPaid, balance: totalDebt - totalPaid };
      }, [cncRecords]);

      const filteredCncRecords = useMemo(() => {
        return cncRecords
          .filter(r => cncFilterType === 'all' || r.type === cncFilterType)
          .sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [cncRecords, cncFilterType]);

      const handleCncSubmit = (e) => {
        e.preventDefault();
        if (!cncFormData.amount || !cncFormData.desc) return;
        const evaluatedAmount = getNum(cncFormData.amount);

        if (editingCncId) {
          setCncRecords(cncRecords.map(r => r.id === editingCncId ? { ...cncFormData, id: editingCncId, amount: evaluatedAmount } : r));
          setEditingCncId(null);
        } else {
          setCncRecords([...cncRecords, { ...cncFormData, id: Date.now(), amount: evaluatedAmount }]);
        }
        setIsCncModalOpen(false);
        setCncFormData({ date: new Date().toISOString().split('T')[0], type: 'payment', desc: '', amount: '', category: '付款' });
      };

      const deleteCncRecord = (id) => {
        if (window.confirm('確定要刪除此筆紀錄嗎？刪除後將同步更新至雲端。')) {
          setCncRecords(cncRecords.filter(r => r.id !== id));
        }
      };

      const startCncEdit = (record) => {
        setEditingCncId(record.id);
        setCncFormData(record);
        setIsCncModalOpen(true);
      };

      // ==========================================
      // 6. 水電費分攤中心邏輯 (Utility Manager)
      // ==========================================
      const xinleUserPay = getNum(xinleBills.floor1Elec) + getNum(xinleBills.floor2Elec) + getNum(xinleBills.water);
      const xinleEmployeePay = getNum(xinleBills.floor3Elec);
      const xinleTotal = xinleUserPay + xinleEmployeePay;

      const gasScript = `/**\n * Google Apps Script for Utility Bill Management\n * 自動化水電費管理腳本\n */\n\nfunction onOpen() {\n  const ui = SpreadsheetApp.getUi();\n  ui.createMenu('💧 水電費管理系統')\n    .addItem('1. 首次設定 (建立表單)', 'setupSheets')\n    .addItem('2. 計算並儲存本期帳單', 'saveCurrentBills')\n    .addSeparator()\n    .addItem('3. 加入 Google 日曆提醒', 'addCalendarReminders')\n    .addToUi();\n}\n\nfunction setupSheets() {\n  const ss = SpreadsheetApp.getActiveSpreadsheet();\n  let inputSheet = ss.getSheetByName('當期輸入');\n  if (!inputSheet) inputSheet = ss.insertSheet('當期輸入');\n  else inputSheet.clear();\n\n  inputSheet.getRange('A1:E1').merge().setValue('🏠 水電費計算輸入表 (每雙月填寫)').setFontWeight('bold').setBackground('#4285F4').setFontColor('white').setHorizontalAlignment('center');\n  \n  inputSheet.getRange('A3').setValue('📍 新樂街 168 號').setFontWeight('bold');\n  inputSheet.getRange('A4').setValue('1樓 電費');\n  inputSheet.getRange('A5').setValue('2樓 電費');\n  inputSheet.getRange('A6').setValue('3樓 電費 (員工)');\n  inputSheet.getRange('A7').setValue('全棟 水費');\n  inputSheet.getRange('B4:B7').setBackground('#FFF2CC').setBorder(true, true, true, true, true, true);\n\n  inputSheet.getRange('D3').setValue('📍 武慶一路 (共住)').setFontWeight('bold');\n  inputSheet.getRange('D4').setValue('總電費');\n  inputSheet.getRange('D5').setValue('總水費');\n  inputSheet.getRange('D6').setValue('分攤人數設定');\n  inputSheet.getRange('E4:E6').setBackground('#FFF2CC').setBorder(true, true, true, true, true, true);\n  inputSheet.getRange('E6').setValue('家庭A:1, 家庭B:3');\n\n  inputSheet.getRange('A9').setValue('📝 操作說明：\\n1. 請在黃色格子輸入金額。\\n2. 點選上方選單「水電費管理系統」>「計算並儲存本期帳單」。');\n\n  let historySheet = ss.getSheetByName('歷史紀錄');\n  if (!historySheet) {\n    historySheet = ss.insertSheet('歷史紀錄');\n    const headers = ['紀錄日期', '繳費月份', '地址', '項目', '總金額', '支付方', '應繳金額', '狀態'];\n    historySheet.getRange(1, 1, 1, headers.length).setValues([headers]).setFontWeight('bold').setBackground('#E0E0E0');\n    historySheet.setFrozenRows(1);\n  }\n  SpreadsheetApp.getUi().alert('✅ 表單結構建立完成！請切換到「當期輸入」分頁。');\n}\n\nfunction saveCurrentBills() {\n  const ss = SpreadsheetApp.getActiveSpreadsheet();\n  const inputSheet = ss.getSheetByName('當期輸入');\n  const historySheet = ss.getSheetByName('歷史紀錄');\n\n  if (!inputSheet || !historySheet) {\n    SpreadsheetApp.getUi().alert('❌ 請先執行「首次設定」。');\n    return;\n  }\n\n  const x_1F = inputSheet.getRange('B4').getValue() || 0;\n  const x_2F = inputSheet.getRange('B5').getValue() || 0;\n  const x_3F = inputSheet.getRange('B6').getValue() || 0;\n  const x_Water = inputSheet.getRange('B7').getValue() || 0;\n  const w_Elec = inputSheet.getRange('E4').getValue() || 0;\n  const w_Water = inputSheet.getRange('E5').getValue() || 0;\n  \n  // Parse dynamic people count from E6 (e.g. "家庭A:1, 家庭B:3")\n  let famA = 1, famB = 3;\n  try {\n      const peopleStr = inputSheet.getRange('E6').getValue() || '';\n      const matches = peopleStr.match(/\\d+/g);\n      if(matches && matches.length >= 2) { famA = parseInt(matches[0]); famB = parseInt(matches[1]); }\n  } catch(e) {}\n\n  const xinle_MyPay = x_1F + x_2F + x_Water;\n  const xinle_EmpPay = x_3F;\n  const wuqing_Total = w_Elec + w_Water;\n  const wuqing_PerPerson = wuqing_Total / (famA + famB);\n  const wuqing_FamA = Math.round(wuqing_PerPerson * famA);\n  const wuqing_FamB = Math.round(wuqing_PerPerson * famB);\n\n  const today = new Date();\n  const dateStr = Utilities.formatDate(today, Session.getScriptTimeZone(), 'yyyy/MM/dd');\n  const currentMonth = today.getMonth() + 1;\n\n  const newRows = [\n    [dateStr, currentMonth + '月', '新樂街168號', '1-2樓電費+全棟水費', xinle_MyPay + xinle_EmpPay, '房東(我)', xinle_MyPay, '待繳納'],\n    [dateStr, currentMonth + '月', '新樂街168號', '3樓電費', xinle_EmpPay, '3樓員工', xinle_EmpPay, '待繳納'],\n    [dateStr, currentMonth + '月', '武慶一路', '水電分攤('+famA+'人戶)', wuqing_Total, '家庭A('+famA+'人)', wuqing_FamA, '待繳納'],\n    [dateStr, currentMonth + '月', '武慶一路', '水電分攤('+famB+'人戶)', wuqing_Total, '家庭B('+famB+'人)', wuqing_FamB, '待繳納']\n  ];\n\n  historySheet.getRange(historySheet.getLastRow() + 1, 1, newRows.length, newRows[0].length).setValues(newRows);\n  SpreadsheetApp.getUi().alert('🎉 資料已儲存至「歷史紀錄」。');\n}\n\nfunction addCalendarReminders() {\n  const ui = SpreadsheetApp.getUi();\n  const response = ui.alert('📅 設定日曆提醒', '將在日曆中加入雙月5號的繳費提醒，確定嗎？', ui.ButtonSet.YES_NO);\n  if (response == ui.Button.NO) return;\n\n  const calendar = CalendarApp.getDefaultCalendar();\n  const year = new Date().getFullYear();\n  const months = [1, 3, 5, 7, 9, 11]; \n  \n  months.forEach(monthIndex => {\n    const startDate = new Date(year, monthIndex, 5, 9, 0);\n    const endDate = new Date(year, monthIndex, 5, 10, 0);\n    const title = '💰 繳納水電費 (新樂街/武慶路)';\n    \n    if (!calendar.getEventsForDay(startDate).some(e => e.getTitle() === title)) {\n      calendar.createEvent(title, startDate, endDate, {description: '雙月5號繳納水電費'});\n    }\n  });\n  ui.alert('✅ 已將提醒加入您的 Google 日曆。');\n}`;

        const etfDetails = etfs.map(etf => {
          const singlePaymentGross = getNum(etf.divPerPeriod) * getNum(etf.shares);
          const healthTaxPerPayment = singlePaymentGross >= 20000 ? Math.round(singlePaymentGross * 0.0211) : 0;
          const singlePaymentNet = singlePaymentGross - healthTaxPerPayment;
          
          const annualGross = singlePaymentGross * getNum(etf.frequency);
          const annualTax = healthTaxPerPayment * getNum(etf.frequency);
          const annualNet = singlePaymentNet * getNum(etf.frequency);

          const maxTaxFreeShares = getNum(etf.divPerPeriod) > 0 ? Math.floor(19999 / getNum(etf.divPerPeriod)) : 0;
          const targetAnnualPerEtf = (getNum(targetMonthly) * 12) / (etfs.length || 1);
          const suggestedShares = getNum(etf.divPerPeriod) > 0 ? Math.ceil(targetAnnualPerEtf / (getNum(etf.divPerPeriod) * getNum(etf.frequency))) : 0;

          const currentMarketValue = getNum(etf.shares) * getNum(etf.price);
          const sharesShortfall = Math.max(0, suggestedShares - getNum(etf.shares));
          const capitalNeeded = sharesShortfall * getNum(etf.price);
          const yieldPercent = getNum(etf.price) > 0 ? ((getNum(etf.divPerPeriod) * getNum(etf.frequency)) / getNum(etf.price)) * 100 : 0;

          totalAnnualGross += annualGross;
          totalAnnualTax += annualTax;
          totalAnnualNet += annualNet;
          totalCurrentMarketValue += currentMarketValue;
          totalAdditionalCapitalNeeded += capitalNeeded;

          return {
            ...etf,
            singlePaymentGross, healthTaxPerPayment, singlePaymentNet, annualNet,
            maxTaxFreeShares, suggestedShares, currentMarketValue, sharesShortfall,
            capitalNeeded, yieldPercent
          };
        });

        return {
          details: etfDetails,
          totalAnnualGross, totalAnnualTax, totalAnnualNet,
          averageMonthlyNet: Math.round(totalAnnualNet / 12),

                        <div className={`border rounded-2xl overflow-hidden shadow-sm ${theme.card}`}>
                            <div className={`p-4 border-b flex items-center gap-3 ${isDarkMode ? 'bg-blue-900/20 border-blue-800/50' : 'bg-blue-50 border-blue-100'}`}>
                                <Icon name="FileSpreadsheet" className="text-blue-500" size={24}/>
                                <h3 className="font-bold text-lg text-blue-700 dark:text-blue-400">方式一：快速複製 CSV (手動)</h3>
                            </div>
                            <div className="p-5 md:p-6 space-y-4">
                                <div className={`text-sm font-medium p-3.5 rounded-xl ${theme.inputBg}`}>
                                    <span className="font-bold">適用情境：</span> 不想設定程式碼，只想把今天算好的結果快速貼到 Excel 或 Line。
                                </div>
                                <div className="relative group">
                                    <textarea 
                                        className={`w-full h-36 p-4 font-mono text-sm border rounded-xl outline-none ${theme.inputBg} ${theme.text} ${theme.border} focus:ring-2 focus:ring-blue-500 transition-all`}
                                        readOnly
                                        value={generateCSV()}
                                    />
                                    <button 
                                        onClick={handleCopyCSV}
                                        className={`absolute top-3 right-3 flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-all ${
                                            copiedCSV ? 'bg-emerald-500 text-white' : `${theme.card} ${theme.text} border ${theme.border} hover:bg-blue-50 hover:text-blue-600 dark:hover:bg-blue-900/30 dark:hover:text-blue-400`
                                        }`}
                                    >
                                        <Icon name={copiedCSV ? "CheckCircle" : "Copy"} size={16}/>
                                        {copiedCSV ? '已複製' : '複製內容'}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Section B: Apps Script */}
                        <div className={`border rounded-2xl overflow-hidden shadow-sm ring-1 ring-purple-500/20 ${theme.card}`}>
                            <div className={`p-4 border-b flex items-center gap-3 ${isDarkMode ? 'bg-purple-900/20 border-purple-800/50' : 'bg-purple-50 border-purple-100'}`}>
                                <Icon name="Terminal" className="text-purple-500" size={24}/>
                                <h3 className="font-bold text-lg text-purple-700 dark:text-purple-400">方式二：Google 試算表自動化腳本 (推薦)</h3>
                            </div>
                            <div className="p-5 md:p-6 space-y-5">
                                <div className={`text-sm font-medium p-3.5 rounded-xl ${theme.inputBg}`}>
                                    <span className="font-bold">適用情境：</span> 想要有專屬的按鈕、自動儲存歷史紀錄、一鍵同步到 Google 日曆。
                                </div>
                                
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="space-y-3">
                                        <h4 className="text-base font-bold flex items-center gap-2 text-purple-600 dark:text-purple-400"><Icon name="BookOpen" size={18}/> 安裝步驟</h4>
                                        <ol className={`list-decimal list-inside text-sm font-medium space-y-2.5 ml-1 ${theme.textMuted}`}>
                                            <li>建立一個新的 Google 試算表。</li>
                                            <li>點選上方選單 <strong>擴充功能</strong> &gt; <strong>Apps Script</strong>。</li>
                                            <li>清空編輯器內容，貼上右側程式碼。</li>
                                            <li>儲存專案 (💾)，並重新整理試算表頁面。</li>
                                            <li>點選新出現的「💧 水電費管理系統」選單。</li>
                                            <li>執行「1. 首次設定」初始化表單。</li>
                                        </ol>
                                    </div>
                                    <div className="relative group">
                                        <textarea 
                                            className="w-full h-56 p-4 font-mono text-xs border border-slate-700 rounded-xl bg-slate-900 text-slate-300 outline-none focus:ring-2 focus:ring-purple-500 transition-all custom-scrollbar"
                                            readOnly
                                            value={gasScript}
                                        />
                                        <button 
                                            onClick={handleCopyGAS}
                                            className={`absolute top-3 right-3 flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-all ${
                                                copiedGAS ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-300 border border-slate-600 hover:bg-slate-700 hover:text-white'
                                            }`}
                                        >
                                            <Icon name={copiedGAS ? "CheckCircle" : "Code"} size={16}/>
                                            {copiedGAS ? '已複製腳本' : '複製代碼'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ========================================================= */}
            {/* 分頁 4：高股息 ETF 存股試算 (ETF Tracker)                    */}
            {/* ========================================================= */}
            {activeTab === 'etf' && (
              <div className="animate-[fadeIn_0.3s_ease-out]">
                {/* 頂部三卡片 (平均月領, 總投資市值, 目標金額) */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                  <div className={`${theme.card} rounded-2xl p-6 border shadow-sm flex flex-col justify-between relative overflow-hidden`}>
                    <div className={`absolute top-0 right-0 p-4 opacity-[0.03] ${theme.text}`}><Icon name="DollarSign" size={80} /></div>
                    <p className={`font-bold text-sm ${theme.textMuted}`}>目前平均月領 (實拿)</p>
                    <p className="text-4xl font-extrabold text-blue-600 dark:text-blue-400 mt-2">
                      {displayValue(etfCalculations.averageMonthlyNet)}
                    </p>
                    <p className={`text-xs font-bold mt-2 ${theme.textMuted}`}>年領總額 <span className={isPrivacyMode ? 'privacy-blur' : ''}>{formatCurrency(etfCalculations.totalAnnualNet)}</span></p>
                  </div>

                  <div className={`${theme.card} rounded-2xl p-6 border shadow-sm flex flex-col justify-between relative overflow-hidden`}>
                    <div className={`absolute top-0 right-0 p-4 opacity-[0.03] ${theme.text}`}><Icon name="Wallet" size={80} /></div>
                    <p className={`font-bold text-sm ${theme.textMuted}`}>目前總投資市值</p>
                    <p className={`text-3xl font-bold mt-2 ${theme.text}`}>
                      {displayValue(etfCalculations.totalCurrentMarketValue)}
                    </p>
                    <p className={`text-xs font-bold mt-2 ${theme.textMuted}`}>依各檔目前設定股價與持股換算</p>
                  </div>

                  <div className={`rounded-2xl p-6 border shadow-sm flex flex-col justify-between ${isDarkMode ? 'bg-indigo-900/20 border-indigo-500/30' : 'bg-gradient-to-br from-white to-blue-50 border-blue-200 shadow-blue-50'}`}>
                    <div className="flex justify-between items-start">
                      <p className="text-blue-800 dark:text-blue-300 font-bold text-sm">設定目標月領金額</p>
                      <Icon name="Target" size={20} className="text-blue-500" />
                    </div>
                    <div className="mt-2 flex items-center gap-2">
                      <span className={`text-xl font-bold ${theme.text}`}>NT$</span>
                      <input 
                        type="number" 
                        value={targetMonthly}
                        onChange={(e) => setTargetMonthly(Number(e.target.value))}
                        className={`w-full text-2xl font-bold bg-transparent border-b-2 border-blue-300 dark:border-blue-700 focus:border-blue-600 dark:focus:border-blue-400 focus:outline-none py-1 ${theme.text}`}
                        step="1000"
                      />
                    </div>
                    <p className="text-xs font-bold text-blue-600 dark:text-blue-400 mt-3">系統將依此計算建議持股股數</p>
                  </div>
                </div>

                {/* 狀態卡片 (尚需投入, 健保預估) */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                  <div className={`${theme.card} rounded-2xl p-6 border shadow-sm flex flex-col justify-between relative overflow-hidden`}>
                    <div className="absolute top-0 right-0 p-4 opacity-[0.03] text-emerald-500"><Icon name="PiggyBank" size={100} /></div>
                    <div className="flex justify-between items-start">
                      <p className={`font-bold text-sm ${theme.textMuted}`}>距離目標尚需投入</p>
                      <Icon name="PiggyBank" size={20} className="text-emerald-500" />
                    </div>
                    <p className="text-3xl font-bold text-emerald-600 dark:text-emerald-400 mt-2">
                      {displayValue(etfCalculations.totalAdditionalCapitalNeeded)}
                    </p>
                    <p className={`text-xs font-bold mt-2 ${theme.textMuted}`}>達成目標月領所需的額外資金總和</p>
                  </div>

                  <div className={`${theme.card} rounded-2xl p-6 border shadow-sm flex flex-col justify-between relative overflow-hidden`}>
                    <div className="absolute top-0 right-0 p-4 opacity-[0.03] text-rose-500"><Icon name="ShieldAlert" size={100} /></div>
                    <div className="flex justify-between items-start">
                      <p className={`font-bold text-sm ${theme.textMuted}`}>二代健保預估 (每年)</p>
                      <Icon name="ShieldAlert" size={20} className="text-rose-400" />
                    </div>
                    <p className="text-3xl font-bold text-rose-500 mt-2">
                      {displayValue(etfCalculations.totalAnnualTax)}
                    </p>
                    <p className={`text-xs font-bold mt-2 ${theme.textMuted}`}>單次股利超過2萬需扣2.11%</p>
                  </div>
                </div>

                {/* 核心持股與試算區塊 */}
                <div className={`${theme.card} rounded-2xl shadow-sm border overflow-hidden mb-8`}>
                  <div className={`p-5 border-b flex justify-between items-center ${theme.tableHeader} ${theme.border}`}>
                    <h2 className="text-lg font-bold flex items-center gap-2">
                      <Icon name="TrendingUp" size={20} className="text-indigo-600 dark:text-indigo-400"/>
                      我的存股清單
                    </h2>
                    <button onClick={addEtf} className="flex items-center gap-1.5 text-sm font-bold bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg transition-colors">
                      <Icon name="Plus" size={14} /> 新增 ETF
                    </button>
                  </div>
                  
                  <div className="overflow-x-auto no-scrollbar">
                    <table className="w-full text-left border-collapse min-w-[900px]">
                      <thead>
                        <tr className={`${theme.tableHeader} text-xs uppercase tracking-wider font-bold border-b ${theme.border}`}>
                          <th className="p-4">代號/名稱</th>
                          <th className="p-4 w-32">目前股數</th>
                          <th className="p-4 w-28 text-right">股價</th>
                          <th className="p-4 w-28 text-right">預估配息</th>
                          <th className="p-4 w-28 text-center">預估殖利率</th>
                          <th className="p-4 w-32 text-center">配息頻率</th>
                          <th className="p-4 text-right">單次實拿(扣稅後)</th>
                          <th className="p-4 text-center">操作</th>
                        </tr>
                      </thead>
                      <tbody className={`divide-y ${theme.border}`}>
                        {etfCalculations.details.map((etf) => (
                          <tr key={etf.id} className={`transition-colors ${theme.hover} group`}>
                            <td className="p-4">
                              <div className="flex flex-col gap-1.5">
                                <input 
                                  type="text" value={etf.code} onChange={(e) => updateEtf(etf.id, 'code', e.target.value)}
                                  placeholder="代號"
                                  className={`font-bold text-sm bg-transparent border border-transparent focus:border-slate-300 dark:focus:border-slate-600 rounded px-1.5 py-0.5 w-20 outline-none ${theme.text}`}
                                />
                                <input 
                                  type="text" value={etf.name} onChange={(e) => updateEtf(etf.id, 'name', e.target.value)}
                                  placeholder="名稱"
                                  className={`text-xs font-bold bg-transparent border border-transparent focus:border-slate-300 dark:focus:border-slate-600 rounded px-1.5 py-0.5 w-full outline-none ${theme.textMuted}`}
                                />
                              </div>
                            </td>
                            <td className="p-4">
                              <div className="flex items-center gap-1.5">
                                <input 
                                  type="text" value={etf.shares} 
                                  onChange={(e) => updateEtf(etf.id, 'shares', e.target.value)}
                                  className={`w-20 p-1.5 border rounded-lg text-right font-bold outline-none font-mono ${theme.input} ${theme.inputBg} ${theme.border} ${isPrivacyMode ? 'privacy-blur' : ''}`}
                                />
                                <span className={`text-xs font-bold ${theme.textMuted}`}>股</span>
                              </div>
                            </td>
                            <td className="p-4">
                              <div className="flex items-center justify-end gap-1">
                                <span className={`text-xs font-bold ${theme.textMuted}`}>$</span>
                                <input 
                                  type="number" value={etf.price} onChange={(e) => updateEtf(etf.id, 'price', e.target.value)}
                                  className={`w-16 p-1.5 border rounded-lg text-right font-bold outline-none font-mono ${theme.input} ${theme.inputBg} ${theme.border}`}
                                  step="0.01" min="0"
                                />
                              </div>
                            </td>
                            <td className="p-4">
                              <div className="flex items-center justify-end gap-1">
                                <span className={`text-xs font-bold ${theme.textMuted}`}>$</span>
                                <input 
                                  type="number" value={etf.divPerPeriod} onChange={(e) => updateEtf(etf.id, 'divPerPeriod', e.target.value)}
                                  className={`w-16 p-1.5 border rounded-lg text-right font-bold outline-none font-mono ${theme.input} ${theme.inputBg} ${theme.border}`}
                                  step="0.01" min="0"
                                />
                              </div>
                            </td>
                            <td className="p-4 text-center">
                              <div className="font-bold text-emerald-600 bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-100 dark:border-emerald-500/20 px-2.5 py-1 rounded-lg inline-block text-sm shadow-sm">
                                {etf.yieldPercent.toFixed(2)}%
                              </div>
                            </td>
                            <td className="p-4 text-center">
                              <select 
                                value={etf.frequency} onChange={(e) => updateEtf(etf.id, 'frequency', e.target.value)}
                                className={`p-1.5 border rounded-lg font-bold text-xs outline-none ${theme.input} ${theme.inputBg} ${theme.border}`}
                              >
                                <option value="12">月配 (12次)</option>
                                <option value="4">季配 (4次)</option>
                                <option value="2">半年配 (2次)</option>
                                <option value="1">年配 (1次)</option>
                              </select>
                            </td>
                            <td className="p-4 text-right">
                              <div className={`font-black text-lg font-mono ${theme.text} ${isPrivacyMode ? 'privacy-blur' : ''}`}>{formatCurrency(etf.singlePaymentNet)}</div>
                              {etf.healthTaxPerPayment > 0 && (
                                <div className="text-[10px] font-bold text-rose-500 flex items-center justify-end gap-1 mt-1">
                                  <Icon name="AlertCircle" size={10} /> 扣保費 <span className={isPrivacyMode ? 'privacy-blur' : ''}>{formatCurrency(etf.healthTaxPerPayment)}</span>
                                </div>
                              )}
                            </td>
                            <td className="p-4 text-center">
                              <button onClick={() => removeEtf(etf.id)} className={`p-2 ${theme.textMuted} hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-lg transition-colors opacity-0 group-hover:opacity-100`} title="刪除">
                                <Icon name="Trash2" size={16} />
                              </button>
                            </td>
                          </tr>
                        ))}
                        {etfs.length === 0 && (
                          <tr>
                            <td colSpan="8" className={`p-8 text-center font-bold ${theme.textMuted}`}>
                              尚未新增任何 ETF，請點擊上方按鈕新增。
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* 策略建議區塊 */}
                <h2 className={`text-xl font-bold mt-10 mb-6 flex items-center gap-2 ${theme.text}`}>
                  <Icon name="Info" size={24} className="text-blue-500" />
                  買進策略與股數建議
                </h2>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {etfCalculations.details.map(etf => (
                    <div key={etf.id} className={`${theme.card} border rounded-2xl p-6 shadow-sm relative overflow-hidden group hover:border-blue-400 dark:hover:border-blue-500 transition-colors`}>
                      <div className="flex justify-between items-start mb-5">
                        <div>
                          <span className="text-[10px] font-black text-blue-600 bg-blue-100 dark:bg-blue-500/20 dark:text-blue-300 px-2.5 py-1 rounded-full tracking-wide">{etf.code}</span>
                          <h3 className={`font-bold text-lg mt-2 ${theme.text}`}>{etf.name || '未命名'}</h3>
                          <p className={`text-xs font-bold mt-1.5 ${theme.textMuted}`}>股價 ${etf.price} • 殖利率 <span className="text-emerald-500">{etf.yieldPercent.toFixed(2)}%</span></p>
                        </div>
                        <div className="text-right">
                          <p className={`text-[10px] font-bold uppercase tracking-wider ${theme.textMuted}`}>目前股數</p>
                          <p className={`font-black text-xl mt-1 text-blue-600 dark:text-blue-400 font-mono ${isPrivacyMode ? 'privacy-blur' : ''}`}>{displayShare(etf.shares)}</p>
                        </div>
                      </div>

                      <div className="space-y-4">
                        {/* 目標建議 */}
                        <div className={`p-4 rounded-xl border ${theme.inputBg} ${theme.border}`}>
                          <p className={`text-xs font-bold mb-2 ${theme.textMuted}`}>為達到您的月領目標，建議配置至：</p>
                          <div className="flex items-end justify-between">
                            <span className="text-2xl font-black text-indigo-600 dark:text-indigo-400 font-mono">{etf.suggestedShares.toLocaleString()} <span className={`text-xs font-bold ${theme.textMuted}`}>股</span></span>
                            {etf.suggestedShares > etf.shares ? (
                              <div className="text-right">
                                <span className={`text-xs font-black text-rose-500 block mb-1 ${isPrivacyMode ? 'privacy-blur' : ''}`}>缺 {displayShare(etf.sharesShortfall)}</span>
                                <span className={`text-[10px] font-bold ${theme.textMuted} block ${isPrivacyMode ? 'privacy-blur' : ''}`}>約需 {formatCurrency(etf.capitalNeeded)}</span>
                              </div>
                            ) : (
                              <span className="text-xs font-black text-emerald-500 bg-emerald-50 dark:bg-emerald-500/10 px-2 py-1 rounded-lg">已達標 ✨</span>
                            )}
                          </div>
                        </div>

                        {/* 健保門檻 */}
                        <div className={`p-4 rounded-xl border ${etf.shares > etf.maxTaxFreeShares ? 'bg-rose-50 border-rose-200 dark:bg-rose-900/20 dark:border-rose-800/50' : 'bg-amber-50 border-amber-200 dark:bg-amber-900/20 dark:border-amber-800/50'}`}>
                          <div className="flex justify-between items-center">
                            <p className={`text-xs font-bold ${theme.textMuted}`}>免扣二代健保上限</p>
                            <span className={`text-sm font-black font-mono ${theme.text}`}>{etf.maxTaxFreeShares.toLocaleString()} 股</span>
                          </div>
                          {etf.suggestedShares > etf.maxTaxFreeShares && (
                            <p className="text-[10px] font-bold text-rose-500 mt-2 flex items-center gap-1.5 leading-relaxed">
                              <Icon name="AlertCircle" size={12} className="shrink-0" /> 目標股數已超過免稅上限，建議分散投資其他標的以節省稅金。
                            </p>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

              </div>
            )}

            <style dangerouslySetInnerHTML={{__html: `
              @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
              .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
              .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
              .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
              .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
            `}} />
            <footer className={`pt-8 pb-4 mt-8 border-t ${theme.border} text-center ${theme.textMuted} text-xs font-bold tracking-wide`}>
              整合 ETF 試算、CNC 追蹤、財富盤點與水電費管理 | 所有資料皆透過 Auto-Save 技術自動備份至您的專屬雲端
            </footer>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
